<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>New webpage</title>
        <style>
            body{
                overflow: hidden;
            }
            
            #the-canvas{
                position: absolute;
                left: 0;
                top: 0;
            }
        </style>
    </head>
    <body>
<canvas id="the-canvas"></canvas>
<script type="module">
        for (let i = requestAnimationFrame(Math.cos);i > 0; cancelAnimationFrame(i--)){};
    let canvas = document.getElementById("the-canvas");
    let ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    let keys = [];
    window.addEventListener("keydown", function(event){
        event.preventDefault();
        keys[event.code] = true;
    });
    window.addEventListener("keyup", function(event){
        keys[event.code] = false;
    });
    let rectRect = function(x1, y1, w1, h1, x2, y2, w2, h2){
        return(x1 + w1 > x2 && y1 + h1 > y2 && x1 < x2 + w2 && y1 < y2 + h2);    
    };
    const player = {
        x: 50,
        y: 300,
        xv: 0,
        yv: 0,
        w: 38,
        h: 38,
        grav: 0.32,
        jumpHeight: 8,
        canJump: false,
        draw: function(){
            ctx.fillStyle = "lightgoldenrodyellow";
            ctx.fillRect(this.x, this.y, this.w, this.h);
            ctx.beginPath();
            ctx.fillStyle = "black";
            ctx.arc(this.x+this.w/3, this.y+this.h/2.4, this.w/10, 0, Math.PI*2);
            ctx.arc(this.x+this.w-this.w/3, this.y+this.h/2.4, this.w/10, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.fillStyle = "red";
            ctx.arc(this.x+this.w/2, this.y+this.h-this.h/3, this.w/4, 0, Math.PI);
            ctx.fill();
        },
        move: function(){
            this.y += this.yv;
            this.yv += this.grav;
            if(keys['ArrowUp'] & this.canJump) {
                this.yv = -this.jumpHeight;
                this.canJump = false;
            }
            if(keys['ArrowDown']) {
                this.y += 5;
            }
            if(keys['ArrowLeft']) {
                this.x -= 5;
            }
            if(keys['ArrowRight']) {
                this.x += 5;
            }
            if(this.x < 0){
                this.x = 0;
            }
            if(this.y < 0){
                this.y = 0;
                this.yv *= -1;
            }
            if(this.x > canvas.width - this.w){
                this.x = canvas.width - this.w;
            }
            if(this.y > canvas.height - this.h){
                this.y = canvas.height - this.h;
                this.canJump = true;
            }
        },
    }
    
    const draw = () => {
        requestAnimationFrame(draw);
        ctx.fillStyle = "rgba(180, 140, 60, 0.5)"
        ctx.fillRect(0, 0, 600, 400);
        player.draw();
        player.move();
    }
    draw();

</script>
    </body>
</html>
