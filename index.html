<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>New webpage</title>
    </head>
    <body>
<input type="file" id="images">
<button id="boo">CLICK</button>

    </body>
    <script>
    var Add = document.getElementById("boo")
         var addName = function(e){
            e.preventDefault();
            var theImg = document.getElementById("images");
            var img = document.createElement("img");
            img.src=theImg.value;
            document.body.append(img);
            
        }
        
        Add.addEventListener("click", addName);
    </script>
</html>
